coils:

  # *************************
  # BOARD ZERO - 3208
  # *************************
  # HARDWARE / COILS
  # *************************
  # ------------- BANK 0-7 ---------------
  c_0_0:
    number: fastBoard_0-0
    # OUTHOLE
    default_pulse_ms: 250
    max_pulse_ms: 250
    default_pulse_power: 1.0
    max_pulse_power: 1.0
    
  c_0_1:
    number: fastBoard_0-1
    # N/A
    default_pulse_ms: 250
    max_pulse_ms: 250
    default_pulse_power: 1.0
    max_pulse_power: 1.0
    default_hold_power: 1.0
    max_hold_power: 1.0
    #allow_enable: true
    
  c_0_2:
    number: fastBoard_0-2
    # GAME_OVER_RELAY
    default_pulse_ms: 250
    max_pulse_ms: 250
    default_pulse_power: 1.0
    max_pulse_power: 1.0
    default_hold_power: 1.0
    max_hold_power: 1.0
    allow_enable: true
    enable_events: ball_started
    disable_events: ball_will_end
    
  c_0_3:
    number: fastBoard_0-3
    # TILT_RELAY
    default_pulse_ms: 250
    max_pulse_ms: 250
    default_pulse_power: 1.0
    max_pulse_power: 1.0
    default_hold_power: 1.0
    max_hold_power: 1.0
    allow_enable: true
    # enable_events: ball_started
    # disable_events: ball_will_end

  c_0_4:
    number: fastBoard_0-4
    # GI LAMPS
    default_pulse_ms: 250
    max_pulse_ms: 250
    default_pulse_power: 1.0
    max_pulse_power: 1.0
    default_hold_power: 1.0
    max_hold_power: 1.0
    allow_enable: true
    enable_events: mode_attract_started
    
  c_0_5:
    number: fastBoard_0-5
    # KICKOUT
    default_pulse_ms: 50
    max_pulse_ms: 50
    default_pulse_power: 1.0
    max_pulse_power: 1.0
    
  c_0_6:
    number: fastBoard_0-6
    # VARI_TARGET_RESET
    default_pulse_ms: 50
    max_pulse_ms: 50
    default_pulse_power: 1.0
    max_pulse_power: 1.0
    default_hold_power: 1.0
    max_hold_power: 1.0
    allow_enable: true
    
  c_0_7:
    number: fastBoard_0-7
    # DROP_MID_RESET
    default_pulse_ms: 50
    max_pulse_ms: 50
    default_pulse_power: 1.0
    max_pulse_power: 1.0

