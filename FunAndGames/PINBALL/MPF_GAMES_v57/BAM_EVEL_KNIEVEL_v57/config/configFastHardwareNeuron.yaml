hardware:
  #driverboards: fast
  platform: fast
  #lights: fadecandy
  
fast:
  net:
    #controller: nano
    controller: neuron
    port: auto
    baud: 921600
    debug: false
    watchdog: 4s
    io_loop:
      # THESE "fastBoard" NAMES ARE VARIABLE
      fastBoard_0:
        model: FP-I/O-3208
        order: 1
      fastBoard_1:
        model: FP-I/O-0804
        order: 2
      # fastBoard_2:
      #   model: FP-I/O-1616
      #   order: 3
  exp: 
    boards:  
      # neuron:
      #   model: FP-EXP-2000 
      expplayfield:
        model: FP-EXP-0081
      # topper:
      #   model: FP-EXP-0081

